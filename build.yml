name: Build VideoСrunch

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: videocrunch-windows-x64.exe
            ffmpeg_url: https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip

          - os: macos-latest
            artifact_name: videocrunch-macos-arm64

          - os: ubuntu-latest
            artifact_name: videocrunch-linux-x64

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3a. FFmpeg — Windows ──────────────────────────────────────────────
      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.ffmpeg_url }}" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          # Use Get-ChildItem to resolve wildcard safely
          $ffmpeg  = Get-ChildItem -Path "ffmpeg_tmp" -Filter "ffmpeg.exe"  -Recurse | Select-Object -First 1
          $ffprobe = Get-ChildItem -Path "ffmpeg_tmp" -Filter "ffprobe.exe" -Recurse | Select-Object -First 1
          Copy-Item $ffmpeg.FullName  -Destination "bin\ffmpeg.exe"
          Copy-Item $ffprobe.FullName -Destination "bin\ffprobe.exe"
          Write-Host "FFmpeg OK:" (& "bin\ffmpeg.exe" -version | Select-Object -First 1)

      # ── 3b. FFmpeg — macOS ────────────────────────────────────────────────
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"   # fix: untrusted tap error
          HOMEBREW_NO_AUTO_UPDATE: "1"          # speed up CI
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(which ffmpeg)"  bin/ffmpeg
          cp "$(which ffprobe)" bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe

      # ── 3c. FFmpeg — Linux ────────────────────────────────────────────────
      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          mkdir -p bin
          cp "$(which ffmpeg)"  bin/ffmpeg
          cp "$(which ffprobe)" bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller videocrunch.spec --clean

      # ── 5. Rename output ──────────────────────────────────────────────────
      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item "dist\videocrunch.exe" "dist\${{ matrix.artifact_name }}"

      - name: Rename output (Unix)
        if: runner.os != 'Windows'
        run: mv dist/videocrunch "dist/${{ matrix.artifact_name }}"

      # ── 6. Upload artifact ────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30

  # ── Release ──────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release & upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "VideoСrunch ${{ github.ref_name }}"
          body: |
            ## VideoСrunch ${{ github.ref_name }}

            Interactive CLI video compressor — reduces file size without changing resolution.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 64-bit | `videocrunch-windows-x64.exe` |
            | macOS (Apple Silicon) | `videocrunch-macos-arm64` |
            | Linux 64-bit | `videocrunch-linux-x64` |

            > **macOS / Linux**: run `chmod +x videocrunch-*` after download.
          files: release-assets/**/*
          draft: false
          prerelease: false
